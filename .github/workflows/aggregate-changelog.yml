name: Aggregate changelog

# Regenerates the platform-wide CHANGELOG.md from each sub-repo's GitHub Releases.
# Unlike the report-only ecosystem-drift workflow, this one COMMITS the regenerated
# changelog, so it needs contents: write. The generator (scripts/aggregate-changelog.mjs)
# rewrites only the AUTO:BEGIN / AUTO:END region and writes back only on a real diff.

on:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  workflow_dispatch: {}
  repository_dispatch:
    types: [release-published] # sub-repo release workflows can ping this (see README fast-follow)

permissions:
  contents: write

concurrency:
  group: aggregate-changelog
  cancel-in-progress: false

jobs:
  aggregate:
    name: Regenerate aggregate changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Regenerate from sub-repo GitHub Releases
        env:
          # The default GITHUB_TOKEN reads PUBLIC release data cross-org, which is all
          # six platform repos. If a private repo is ever added to ecosystem.json, swap
          # in a PAT secret instead: GH_TOKEN: ${{ secrets.CHANGELOG_AGGREGATION_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/aggregate-changelog.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain CHANGELOG.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore: regenerate aggregate changelog [skip ci]"
            git push
          else
            echo "No changelog drift — nothing to commit."
          fi
