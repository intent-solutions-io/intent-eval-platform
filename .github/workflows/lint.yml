name: Lint (YAML + Actions)

# Deterministic L1 lint for the umbrella's CI-config surface: yamllint + actionlint.
# The umbrella carries no package.json, so there is no ESLint/Prettier lane here —
# its lint surface is the GitHub Actions workflows + the ecosystem manifest.
# These two jobs are REQUIRED, not advisory: a green required check is signal, a
# red advisory check is noise. yamllint runs --strict so warnings fail the gate.
#
# Config: repo-root .yamllint (the umbrella has no .audit-harness/ vendor dir, so
# the policy lives at the root); actionlint uses its built-in rule set.

on:
  pull_request:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - '.yamllint'
      - '.github/workflows/lint.yml'
  push:
    branches: [main]
    paths:
      - '**/*.yml'
      - '**/*.yaml'

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: pip install --no-cache-dir "yamllint==1.35.1"

      - name: Run yamllint (--strict — warnings fail the gate)
        run: |
          yamllint --strict \
            --config-file .yamllint \
            .github/ ecosystem.json

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_level: error
