# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit — intent-eval-platform (Intent Eval Platform umbrella). Semantic AI
# code review. Three non-overlapping layers: L1 deterministic CI (prettier/
# markdownlint/yamllint/actionlint/typos[/eslint/ruff]) owns style; CodeRabbit
# (here) owns semantic review; CodeQL (security-extended) owns security.
# CodeRabbit's built-in linters are disabled so it never re-reports what L1 already
# gates. Terse, assertive, findings-only. gitleaks (CodeRabbit-native secret scan)
# stays ON.
language: en-US
tone_instructions: "Be terse and technical. No preamble, praise, poems, or summaries — findings only: the problem, the file and line, the concrete fix. Flag every real issue; never soft-pedal or skip. Hardcore code review, not a status report."
reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: false
  changed_files_summary: false
  sequence_diagrams: false
  poem: false
  review_status: false
  in_progress_fortune: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  tools:
    eslint:
      enabled: false
    ruff:
      enabled: false
    markdownlint:
      enabled: false
    yamllint:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false
  path_filters:
    - "!**/dist/**"
    - "!**/node_modules/**"
    - "!**/coverage/**"
    - "!**/*.snap"
    - "!**/*.lock"
    - "!pnpm-lock.yaml"
  path_instructions:
    - path: "**/*.{mjs,js,ts,py}"
      instructions: >-
        The umbrella ships cross-repo generator scripts (aggregate-changelog.mjs,
        ecosystem-drift.py) that fan out over the member repos. Flag, by priority: (1) a
        generator that silently no-ops or emits partial output on a missing/renamed member
        repo (a fetch/parse failure swallowed; a repo list that drifts from the real 5+1
        set) and renders stale-as-complete. (2) non-determinism that makes the aggregate
        output unreproducible (unsorted repo iteration, locale-dependent sort, timestamp in
        committed output). (3) a drift-check that fails-open (exits 0 on detected drift). (4)
        an absolute /home/jeremy path or a hardcoded token. (5) a claim in the README/aggregate
        that the code does not actually compute.
    - path: "**/*.{sh,yml,yaml}"
      instructions: >-
        Flag CI/generator workflows that silently no-op or fail-open, an action pinned to a
        moving @main/@latest, and unsafe bash array expansion under `set -u`.
chat:
  auto_reply: true
