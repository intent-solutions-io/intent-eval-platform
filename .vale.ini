# Vale config for the Intent Eval Platform umbrella repo.
#
# Advisory prose lint + banned-marketing-term enforcement for the umbrella's
# README + CHANGELOG. Vendored vocab travels with the repo so the policy is
# reproducible. Runs continue-on-error in CI (advisory lane).
#
# Sync packages via `vale sync` after edits. CI re-syncs on every run.

StylesPath = .vale/styles
MinAlertLevel = warning

# Vocab — accept/reject lists. See .vale/styles/config/vocabularies/IS/{accept,reject}.txt
Vocab = IS

[*.md]
BasedOnStyles = Vale

# Skip frontmatter blocks (YAML) — Vale doesn't parse YAML
TokenIgnores = (?s)(^---\n.*?\n---\n)

# Skip code fences + inline code (Vale handles these poorly for spec text)
BlockIgnores = (?s) *(```.*?```)
