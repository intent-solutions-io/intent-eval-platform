# Template for secrets.ci.sops.yaml — DO NOT put real values here.
#
# Setup:
#   cp secrets.example.yaml secrets.ci.sops.yaml
#   # paste the real token value into secrets.ci.sops.yaml, then encrypt in place
#   sops --encrypt --in-place secrets.ci.sops.yaml      # .sops.yaml supplies the age recipient
#   # (or just `sops secrets.ci.sops.yaml` and edit — it encrypts on save)
#
# Wire into the source repos' GitHub Actions secrets:
#   bash scripts/wire-ci-secrets.sh
#
# ── UMBRELLA_DISPATCH_TOKEN ──
# A fine-grained PAT used by each platform source repo's release.yml
# `notify-umbrella-changelog` job to POST a `release-published` repository_dispatch
# to this umbrella repo (which regenerates the aggregate CHANGELOG instantly).
#
# Create it at github.com/settings/personal-access-tokens:
#   - Resource owner:     intent-solutions-io
#   - Repository access:  Only select repositories → intent-eval-platform
#   - Permissions:        Repository → Contents: Read and write
UMBRELLA_DISPATCH_TOKEN: "github_pat_REPLACE_ME"
